<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a2540">
<title>Red White &amp; Blue Classic — Tee Planner</title>
<style>
  :root{
    --red:#d1332e; --white:#e9edf2; --blue:#1f5fd1;
    --ink:#0f1b2d; --muted:#5b6b7f; --line:#d5dce6; --bg:#f4f6fa;
    --ok:#1f8a4c; --warn:#c9741a; --err:#d1332e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-size:16px; padding-bottom:40px;}
  header{position:sticky; top:0; z-index:20; background:#0a2540; color:#fff;
    padding:10px 12px 12px; box-shadow:0 2px 10px rgba(0,0,0,.18);}
  .title{font-size:15px; font-weight:700; letter-spacing:.02em; display:flex; justify-content:space-between; align-items:center;}
  .title small{font-weight:500; opacity:.75; font-size:12px;}
  .chips{display:flex; gap:6px; margin-top:9px;}
  .chip{flex:1; border-radius:10px; padding:7px 4px 6px; text-align:center; line-height:1.1;
    border:2px solid transparent; background:rgba(255,255,255,.10);}
  .chip b{display:block; font-size:23px; font-weight:800;}
  .chip span{display:block; font-size:10px; text-transform:uppercase; letter-spacing:.05em; opacity:.85; margin-top:2px;}
  .chip.red{background:rgba(209,51,46,.22); border-color:var(--red);} 
  .chip.white{background:rgba(233,237,242,.20); border-color:#c9d3e0;}
  .chip.blue{background:rgba(31,95,209,.24); border-color:var(--blue);} 
  .chip.over{animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,80,60,.7);}50%{box-shadow:0 0 0 5px rgba(255,80,60,0);}}
  .status{margin-top:9px; font-size:13px; font-weight:600; padding:8px 10px; border-radius:9px; line-height:1.35;}
  .status.ok{background:rgba(31,138,76,.20); color:#c8ffdd;}
  .status.warn{background:rgba(201,116,26,.25); color:#ffe4bf;}
  .status.err{background:rgba(209,51,46,.30); color:#ffd4d0;}
  .toolbar{display:flex; gap:8px; padding:10px 12px 4px; flex-wrap:wrap;}
  .btn{flex:1; min-width:86px; border:1px solid var(--line); background:#fff; color:var(--ink);
    border-radius:10px; padding:11px 8px; font-size:13px; font-weight:600; text-align:center;}
  .btn:active{background:#eef2f8;}
  .btn.primary{background:#0a2540; color:#fff; border-color:#0a2540;}
  .wrap{padding:6px 12px;}
  .hole{background:#fff; border:1px solid var(--line); border-radius:14px; margin:10px 0; overflow:hidden;
    box-shadow:0 1px 3px rgba(15,27,45,.05);}
  .hole.locked{opacity:.82; background:#f7f9fc;}
  .hrow{display:flex; align-items:center; padding:9px 12px 4px;}
  .hnum{font-size:20px; font-weight:800; width:52px;}
  .hnum small{display:block; font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em;}
  .hmeta{flex:1; font-size:12px; color:var(--muted); display:flex; gap:14px;}
  .hmeta b{color:var(--ink);} 
  .lock{width:44px; height:34px; border-radius:9px; border:1px solid var(--line); background:#fff;
    display:flex; align-items:center; justify-content:center; font-size:17px;}
  .hole.locked .lock{background:#0a2540; color:#fff; border-color:#0a2540;}
  .tees{display:flex; gap:8px; padding:6px 12px 12px;}
  .tee{flex:1; border-radius:11px; padding:9px 4px 8px; text-align:center; border:2px solid var(--line);
    background:#fff; line-height:1.15; position:relative;}
  .tee .yd{font-size:20px; font-weight:800;}
  .tee .lbl{font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-top:1px;}
  .tee.red{border-color:#f0bcba;} .tee.white{border-color:#cdd6e2;} .tee.blue{border-color:#b9cbef;}
  .tee.sel.red{background:var(--red); border-color:var(--red);}
  .tee.sel.white{background:#5b6b7f; border-color:#5b6b7f;}
  .tee.sel.blue{background:var(--blue); border-color:var(--blue);}
  .tee.sel .yd,.tee.sel .lbl{color:#fff;}
  .tee.sel .lbl{opacity:.9;}
  .tee .chk{position:absolute; top:4px; right:6px; font-size:12px; color:#fff; display:none;}
  .tee.sel .chk{display:block;}
  .hint{font-size:11px; color:var(--muted); padding:0 12px 10px; margin-top:-4px;}
  .modal{position:fixed; inset:0; background:rgba(10,20,40,.55); z-index:50; display:none; padding:14px; overflow:auto;}
  .modal.open{display:block;}
  .sheet{background:#fff; border-radius:16px; max-width:640px; margin:10px auto; padding:16px;}
  .sheet h2{margin:0 0 4px; font-size:17px;}
  .sheet p{margin:0 0 12px; font-size:12px; color:var(--muted);}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{padding:5px 4px; text-align:center; border-bottom:1px solid var(--line);} 
  th{font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:.04em;}
  td input{width:100%; max-width:60px; border:1px solid var(--line); border-radius:7px; padding:6px 2px;
    text-align:center; font-size:14px;}
  .cn{width:100%; border:1px solid var(--line); border-radius:9px; padding:9px; font-size:15px; margin-bottom:12px;}
  .sheet .row{display:flex; gap:8px; margin-top:12px;}
  .menu{position:absolute; background:#fff; border:1px solid var(--line); border-radius:11px; box-shadow:0 8px 24px rgba(10,20,40,.2);
    padding:6px; z-index:40; display:none; min-width:200px;}
  .menu.open{display:block;}
  .menu button{display:block; width:100%; text-align:left; border:0; background:#fff; padding:11px 12px; font-size:14px; border-radius:8px;}
  .menu button:active{background:#eef2f8;}
  .foot{text-align:center; font-size:11px; color:var(--muted); padding:16px 12px 4px;}
</style>
</head>
<body>
<header>
  <div class="title"><span id="courseName">Red, White &amp; Blue Classic</span><small>6 · 6 · 6</small></div>
  <div class="chips">
    <div class="chip red"  id="chipR"><b>0</b><span>Red left</span></div>
    <div class="chip white" id="chipW"><b>0</b><span>White left</span></div>
    <div class="chip blue" id="chipB"><b>0</b><span>Blue left</span></div>
  </div>
  <div class="status ok" id="status">Set your plan below.</div>
</header>

<div class="toolbar">
  <button class="btn primary" id="autoBtn">Auto-plan ▾</button>
  <button class="btn" id="setupBtn">Edit scorecard</button>
  <button class="btn" id="resetBtn">Reset round</button>
</div>
<div class="menu" id="autoMenu">
  <button data-plan="short">🟢 Shortest round (min yards)</button>
  <button data-plan="long">🔴 Longest round (max yards)</button>
  <button data-plan="clearlocks">🔓 Clear all played locks</button>
</div>

<div class="wrap" id="holes"></div>
<div class="foot">Tap a tee to assign it · tap the 🔒 once a hole is played to lock it · saves automatically on this phone</div>

<!-- Setup modal -->
<div class="modal" id="setup">
  <div class="sheet">
    <h2>Edit scorecard</h2>
    <p>Enter yardages for each tee. Par &amp; handicap (Hcp) are optional but help the auto-plan.</p>
    <input class="cn" id="cnInput" placeholder="Course / event name">
    <div style="overflow:auto;">
      <table id="editTable"></table>
    </div>
    <div class="row">
      <button class="btn" id="setupCancel">Cancel</button>
      <button class="btn primary" id="setupSave">Save</button>
    </div>
  </div>
</div>

<script>
"use strict";
const LS_KEY = "rwbClassicPeacockV1";
const COLORS = ["red","white","blue"];
const LABEL = {red:"Red", white:"White", blue:"Blue"};

// ---- Peacock Gap Golf Club scorecard (Red / White / Blue tees, par 71) ----
const DEFAULT = {
  name: "Peacock Gap — R/W/B Classic",
  holes: [
    {hole:1,  par:4, hcp:3,  red:337, white:376, blue:404, color:null, locked:false},
    {hole:2,  par:4, hcp:1,  red:270, white:382, blue:393, color:null, locked:false},
    {hole:3,  par:3, hcp:7,  red:121, white:155, blue:170, color:null, locked:false},
    {hole:4,  par:5, hcp:13, red:403, white:488, blue:501, color:null, locked:false},
    {hole:5,  par:4, hcp:5,  red:306, white:360, blue:381, color:null, locked:false},
    {hole:6,  par:3, hcp:11, red:113, white:148, blue:171, color:null, locked:false},
    {hole:7,  par:4, hcp:9,  red:213, white:276, blue:287, color:null, locked:false},
    {hole:8,  par:5, hcp:17, red:394, white:462, blue:472, color:null, locked:false},
    {hole:9,  par:4, hcp:15, red:295, white:335, blue:348, color:null, locked:false},
    {hole:10, par:3, hcp:18, red:103, white:122, blue:131, color:null, locked:false},
    {hole:11, par:4, hcp:2,  red:317, white:378, blue:386, color:null, locked:false},
    {hole:12, par:5, hcp:8,  red:420, white:515, blue:530, color:null, locked:false},
    {hole:13, par:3, hcp:10, red:132, white:173, blue:190, color:null, locked:false},
    {hole:14, par:5, hcp:6,  red:395, white:464, blue:484, color:null, locked:false},
    {hole:15, par:4, hcp:12, red:289, white:323, blue:356, color:null, locked:false},
    {hole:16, par:3, hcp:14, red:121, white:129, blue:148, color:null, locked:false},
    {hole:17, par:4, hcp:16, red:248, white:300, blue:320, color:null, locked:false},
    {hole:18, par:4, hcp:4,  red:351, white:406, blue:429, color:null, locked:false}
  ]
};

let state = load();

function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const s = JSON.parse(raw); if(s && s.holes && s.holes.length===18) return s; }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

// ---- Counting / constraints ----
function counts(){
  const played={red:0,white:0,blue:0}, planned={red:0,white:0,blue:0};
  for(const h of state.holes){
    if(h.color){ planned[h.color]++; if(h.locked) played[h.color]++; }
  }
  return {played, planned};
}
function remaining(){ // budget left = 6 minus LOCKED(played) of that color
  const {played}=counts();
  return {red:6-played.red, white:6-played.white, blue:6-played.blue};
}

function statusMessage(){
  const {played, planned}=counts();
  const rem=remaining();
  const unlocked = state.holes.filter(h=>!h.locked);
  const unlockedCount = unlocked.length;

  // Hard error: too many of a color already locked in
  for(const c of COLORS){ if(played[c]>6) return {cls:"err", msg:`⛔ You've locked ${played[c]} ${LABEL[c]} tees — the max is 6. Unlock one.`}; }

  // Forced: a color's remaining budget equals the number of holes still to play
  for(const c of COLORS){
    if(rem[c] === unlockedCount && unlockedCount>0 && rem[c]>0){
      return {cls:"warn", msg:`⚠ Every remaining hole must be ${LABEL[c]} — you have ${rem[c]} ${LABEL[c]} left and ${unlockedCount} holes to play.`};
    }
  }

  // Plan balance among UNLOCKED holes vs remaining budget
  const planUnlocked={red:0,white:0,blue:0}, unassigned=[];
  for(const h of unlocked){ if(h.color) planUnlocked[h.color]++; else unassigned.push(h); }
  const over=[], under=[];
  for(const c of COLORS){
    const diff = planUnlocked[c]-rem[c];
    if(diff>0) over.push(`${diff} too many ${LABEL[c]}`);
    if(diff<0) under.push(`${-diff} more ${LABEL[c]}`);
  }
  if(unassigned.length){
    return {cls:"warn", msg:`${unassigned.length} hole(s) not assigned yet. Still need: ${under.length?under.join(", "):"—"}.`};
  }
  if(over.length){
    return {cls:"warn", msg:`Off balance: ${over.join(", ")}. Swap ${over.length?"a "+over[0].split(" ").slice(-1)[0]:""} on a later hole → ${under.join(", ")||"rebalance"}.`};
  }
  if(unlockedCount===0){
    const good = COLORS.every(c=>played[c]===6);
    return good ? {cls:"ok", msg:"🏁 Round complete — 6 Red, 6 White, 6 Blue. Nice."}
                : {cls:"err", msg:`Round done but not 6·6·6: ${played.red}R / ${played.white}W / ${played.blue}B.`};
  }
  return {cls:"ok", msg:`✓ Balanced. On track for 6·6·6. ${unlockedCount} holes to play.`};
}

// ---- Rendering ----
function render(){
  document.getElementById("courseName").textContent = state.name || "Red, White & Blue Classic";
  const rem=remaining();
  const {planned, played}=counts();
  for(const c of COLORS){
    const chip=document.getElementById("chip"+c[0].toUpperCase());
    chip.querySelector("b").textContent = rem[c];
    chip.querySelector("span").textContent = `${LABEL[c]} left · ${played[c]}/6 in`;
    chip.classList.toggle("over", rem[c]<0);
  }
  const st=statusMessage();
  const s=document.getElementById("status"); s.className="status "+st.cls; s.textContent=st.msg;

  const box=document.getElementById("holes"); box.innerHTML="";
  for(const h of state.holes){
    const card=document.createElement("div");
    card.className="hole"+(h.locked?" locked":"");
    card.innerHTML=`
      <div class="hrow">
        <div class="hnum">${h.hole}<small>Hole</small></div>
        <div class="hmeta"><span>Par <b>${h.par||"–"}</b></span><span>Hcp <b>${h.hcp||"–"}</b></span></div>
        <button class="lock" data-lock="${h.hole}" title="Mark played / lock">${h.locked?"🔒":"🔓"}</button>
      </div>
      <div class="tees">
        ${COLORS.map(c=>`
          <button class="tee ${c}${h.color===c?" sel":""}" data-hole="${h.hole}" data-color="${c}">
            <span class="chk">✓</span>
            <div class="yd">${h[c]||"–"}</div><div class="lbl">${LABEL[c]}</div>
          </button>`).join("")}
      </div>`;
    box.appendChild(card);
  }
}

// ---- Interactions ----
document.getElementById("holes").addEventListener("click", e=>{
  const tee=e.target.closest(".tee");
  if(tee){
    const h=state.holes.find(x=>x.hole==tee.dataset.hole);
    if(h.locked){ // tapping a tee on a locked hole re-picks and unlocks for editing
      h.locked=false;
    }
    h.color = (h.color===tee.dataset.color)? null : tee.dataset.color;
    save(); render(); return;
  }
  const lk=e.target.closest(".lock");
  if(lk){
    const h=state.holes.find(x=>x.hole==lk.dataset.lock);
    if(!h.color){ // must pick a tee before locking
      const s=document.getElementById("status"); s.className="status warn"; s.textContent="Pick a tee for hole "+h.hole+" before locking it in.";
      return;
    }
    h.locked=!h.locked; save(); render();
  }
});

// Auto-plan menu
const autoMenu=document.getElementById("autoMenu"), autoBtn=document.getElementById("autoBtn");
autoBtn.addEventListener("click", ()=>{
  const r=autoBtn.getBoundingClientRect();
  autoMenu.style.left=r.left+"px"; autoMenu.style.top=(r.bottom+6+window.scrollY)+"px";
  autoMenu.classList.toggle("open");
});
document.addEventListener("click", e=>{ if(!e.target.closest("#autoMenu")&&!e.target.closest("#autoBtn")) autoMenu.classList.remove("open"); });
autoMenu.addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  const mode=b.dataset.plan;
  if(mode==="clearlocks"){ state.holes.forEach(h=>h.locked=false); }
  else { autoPlan(mode); }
  autoMenu.classList.remove("open"); save(); render();
});

// Reset
document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(confirm("Clear all tee picks and locks for this round? (Scorecard yardages are kept.)")){
    state.holes.forEach(h=>{h.color=null; h.locked=false;}); save(); render();
  }
});

// ---- Auto-plan: choose 6/6/6 minimizing or maximizing total yardage, respecting locked holes ----
function autoPlan(mode){
  const sign = (mode==="long")? -1 : 1; // minimize sign*yardage
  const locked = state.holes.filter(h=>h.locked && h.color);
  const need = {red:6,white:6,blue:6};
  for(const h of locked) need[h.color]--;
  const free = state.holes.filter(h=>!(h.locked && h.color));
  // Guard: if locked already exceed a color, bail gracefully
  if(Object.values(need).some(v=>v<0)){ alert("You've locked more than 6 of a color — unlock some first."); return; }
  // Initial feasible assignment: fill reds, whites, blues arbitrarily to meet 'need'
  let assign = new Map();
  let idx=0; const order=[...free];
  for(const c of COLORS){ for(let k=0;k<need[c];k++){ assign.set(order[idx].hole, c); idx++; } }
  const cost=(hole,c)=> sign * (state.holes.find(x=>x.hole==hole)[c]||0);
  // 2-opt: swap colors between two holes if it lowers total cost
  let improved=true, guard=0;
  while(improved && guard++<2000){
    improved=false;
    for(let i=0;i<free.length;i++){ for(let j=i+1;j<free.length;j++){
      const hi=free[i].hole, hj=free[j].hole, ci=assign.get(hi), cj=assign.get(hj);
      if(ci===cj) continue;
      const before=cost(hi,ci)+cost(hj,cj);
      const after =cost(hi,cj)+cost(hj,ci);
      if(after<before-0.0001){ assign.set(hi,cj); assign.set(hj,ci); improved=true; }
    }}
  }
  for(const h of free){ h.color=assign.get(h.hole); }
}

// ---- Setup / scorecard editor ----
const setup=document.getElementById("setup");
document.getElementById("setupBtn").addEventListener("click", openSetup);
document.getElementById("setupCancel").addEventListener("click", ()=>setup.classList.remove("open"));
document.getElementById("setupSave").addEventListener("click", saveSetup);
function openSetup(){
  document.getElementById("cnInput").value = state.name||"";
  const t=document.getElementById("editTable");
  t.innerHTML="<tr><th>Hole</th><th>Par</th><th>Hcp</th><th style='color:var(--red)'>Red</th><th>White</th><th style='color:var(--blue)'>Blue</th></tr>"+
    state.holes.map(h=>`<tr>
      <td><b>${h.hole}</b></td>
      <td><input type="number" data-f="par"   data-h="${h.hole}" value="${h.par||""}"></td>
      <td><input type="number" data-f="hcp"   data-h="${h.hole}" value="${h.hcp||""}"></td>
      <td><input type="number" data-f="red"   data-h="${h.hole}" value="${h.red||""}"></td>
      <td><input type="number" data-f="white" data-h="${h.hole}" value="${h.white||""}"></td>
      <td><input type="number" data-f="blue"  data-h="${h.hole}" value="${h.blue||""}"></td>
    </tr>`).join("");
  setup.classList.add("open");
}
function saveSetup(){
  state.name=document.getElementById("cnInput").value.trim()||"Red, White & Blue Classic";
  document.querySelectorAll("#editTable input").forEach(inp=>{
    const h=state.holes.find(x=>x.hole==inp.dataset.h);
    const v=inp.value===""?null:Number(inp.value);
    h[inp.dataset.f]=v;
  });
  save(); setup.classList.remove("open"); render();
}

render();
</script>
</body>
</html>
